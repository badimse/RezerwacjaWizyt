<div class="container" style="padding: 50px; text-align: center; font-family: sans-serif;">
    {% if validlink %}
        <h2 style="color: #d63384;">Ustaw nowe hasło</h2>
        <form method="post" style="display: inline-block; text-align: left; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width: 100%; border:none; cursor:pointer; background: #d63384; color: white; padding: 12px; border-radius: 25px; font-weight: bold;">Zatwierdź nowe hasło</button>
        </form>
    {% else %}
        <h2 style="color: #dc3545;">Link wygasł</h2>
        <p>Niestety ten link do resetowania hasła jest już nieważny lub został już wykorzystany.</p>
        <a href="{% url 'password_reset' %}" style="color: #d63384; font-weight: bold;">Poproś o nowy link</a>
    {% endif %}
</div>
