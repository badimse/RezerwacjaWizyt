<div class="container" style="padding: 50px; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <h2 style="color: #d63384;">Zmień swoje hasło</h2>
    <p>Wprowadź stare hasło, a następnie dwukrotnie nowe.</p>
    <form method="post" style="display: inline-block; text-align: left; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee;">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn-book" style="width: 100%; border:none; cursor:pointer; background-color: #d63384; color: white; padding: 12px; border-radius: 25px; font-weight: bold;">Zaktualizuj hasło</button>
    </form>
</div>
