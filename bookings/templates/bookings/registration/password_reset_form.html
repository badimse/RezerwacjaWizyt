<div class="container" style="padding: 50px; text-align: center;">
    <h2>Zapomniałeś hasła?</h2>
    <p>Podaj swój e-mail, a wyślemy Ci link do ustawienia nowego hasła.</p>
    <form method="post" style="display: inline-block;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-book" style="border:none; cursor:pointer; background: #d63384; color: white; padding: 10px 20px; border-radius: 20px;">Wyślij link</button>
    </form>
</div>
